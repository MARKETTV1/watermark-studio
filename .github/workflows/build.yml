name: Build WatermarkStudio EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install Pillow pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --windowed --name "WatermarkStudio" watermark_app.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v3
      with:
        name: WatermarkStudio-EXE
        path: dist/WatermarkStudio.exe
